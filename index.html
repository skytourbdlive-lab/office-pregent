<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Present - Smart Attendance System</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Hind Siliguri) -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- App Header -->
    <header class="w-full max-w-md my-4 text-center">
        <div class="inline-flex items-center justify-center p-3.5 bg-blue-600/20 text-blue-400 rounded-2xl mb-2 border border-blue-500/30 shadow-lg shadow-blue-500/10">
            <i class="fa-solid fa-building-user text-3xl"></i>
        </div>
        <h1 class="text-2xl font-bold tracking-wide text-white">Office Present</h1>
        <p class="text-xs text-slate-400 mt-1">স্মার্ট ডিজিটাল হাজিরা সিস্টেম</p>
    </header>

    <!-- Main Container -->
    <main class="w-full max-w-md bg-slate-800/80 backdrop-blur-md rounded-3xl p-6 border border-slate-700/60 shadow-2xl space-y-6">

        <!-- Live Clock & Date -->
        <div class="bg-slate-900/60 rounded-2xl p-4 text-center border border-slate-700/40 shadow-inner">
            <div id="liveClock" class="text-3xl font-extrabold text-blue-400 tracking-wider">00:00:00 AM</div>
            <div id="liveDate" class="text-xs text-slate-400 mt-1 font-medium">-- -- ----</div>
        </div>

        <!-- IP Status Badge (Bypassed for Today) -->
        <div class="bg-emerald-500/10 border border-emerald-500/30 rounded-xl p-3 flex items-center justify-between text-xs">
            <div class="flex items-center gap-2 text-emerald-400">
                <i class="fa-solid fa-wifi text-base"></i>
                <div>
                    <span class="font-semibold block text-slate-200">ওয়াইফাই আইপি ফিল্টার:</span>
                    <span class="text-slate-400 text-[11px]">আজকের জন্য টেস্ট মোড চালু (আইপি ছাড়াই হাজিরা হবে)</span>
                </div>
            </div>
            <span class="bg-emerald-500/20 text-emerald-300 font-bold px-2 py-0.5 rounded-full text-[10px]">Active</span>
        </div>

        <!-- Attendance Form -->
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-slate-300 mb-1.5" for="employeeId">
                    <i class="fa-solid fa-id-card text-blue-400 mr-1"></i> এমপ্লয়ি আইডি (Employee ID)
                </label>
                <input type="text" id="employeeId" placeholder="উদাহরণ: EMP-101" 
                       class="w-full bg-slate-900/90 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
            </div>

            <div>
                <label class="block text-xs font-medium text-slate-300 mb-1.5" for="employeeName">
                    <i class="fa-solid fa-user text-blue-400 mr-1"></i> আপনার নাম (Name)
                </label>
                <input type="text" id="employeeName" placeholder="উদাহরণ: রাব্বি হাসান" 
                       class="w-full bg-slate-900/90 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
            </div>

            <!-- Buttons -->
            <div class="grid grid-cols-2 gap-3 pt-2">
                <button id="checkInBtn" class="flex items-center justify-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-semibold py-3.5 px-4 rounded-xl shadow-lg shadow-blue-900/30 transition active:scale-95">
                    <i class="fa-solid fa-right-to-bracket"></i> চেক-ইন
                </button>
                <button id="checkOutBtn" class="flex items-center justify-center gap-2 bg-gradient-to-r from-rose-600 to-red-600 hover:from-rose-500 hover:to-red-500 text-white font-semibold py-3.5 px-4 rounded-xl shadow-lg shadow-red-900/30 transition active:scale-95">
                    <i class="fa-solid fa-right-from-bracket"></i> চেক-আউট
                </button>
            </div>
        </div>

        <!-- Alert Notification -->
        <div id="statusMessage" class="hidden p-3 rounded-xl text-xs font-medium text-center transition-all"></div>

        <!-- Realtime Today's Attendance Logs -->
        <div class="pt-2 border-t border-slate-700/50">
            <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3 flex items-center justify-between">
                <span>আজকের হাজিরা তালিকা</span>
                <i class="fa-solid fa-list-check text-blue-400"></i>
            </h2>
            <div id="logsContainer" class="space-y-2 max-h-48 overflow-y-auto pr-1">
                <p class="text-xs text-slate-500 text-center py-4">ডাটা লোড হচ্ছে...</p>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="mt-auto py-4 text-xs text-slate-500 text-center">
        &copy; 2026 Office Present | Powered by Firebase
    </footer>

    <!-- Firebase JS Modules Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            query, 
            where, 
            orderBy, 
            onSnapshot, 
            serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        // Your Exact Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDlSNyXgvC7_UEVdpTtZhyPLWpjXc1RRgE",
            authDomain: "office-pregent.firebaseapp.com",
            projectId: "office-pregent",
            storageBucket: "office-pregent.firebasestorage.app",
            messagingSenderId: "508840158364",
            appId: "1:508840158364:web:2cfb4e77b58891d27a7959",
            measurementId: "G-9X3B49HZY8"
        };

        // Initialize Firebase Services
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);

        // UI Live Clock Script
        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').textContent = now.toLocaleTimeString('en-US', { hour12: true });
            document.getElementById('liveDate').textContent = now.toLocaleDateString('bn-BD', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
            });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Notification Helper Function
        function showMessage(msg, isSuccess = true) {
            const msgEl = document.getElementById('statusMessage');
            msgEl.textContent = msg;
            msgEl.className = `p-3 rounded-xl text-xs font-medium text-center transition-all ${
                isSuccess 
                ? 'bg-emerald-500/20 text-emerald-300 border border-emerald-500/30' 
                : 'bg-rose-500/20 text-rose-300 border border-rose-500/30'
            }`;
            msgEl.classList.remove('hidden');
            setTimeout(() => msgEl.classList.add('hidden'), 4000);
        }

        // Attendance Submission Logic
        async function markAttendance(type) {
            const empId = document.getElementById('employeeId').value.trim();
            const empName = document.getElementById('employeeName').value.trim();

            if (!empId || !empName) {
                showMessage('দয়া করে এমপ্লয়ি আইডি এবং নাম উভয়ই ইনপুট দিন।', false);
                return;
            }

            try {
                // Today's date ISO format
                const todayStr = new Date().toISOString().split('T')[0];

                await addDoc(collection(db, "attendances"), {
                    employeeId: empId,
                    employeeName: empName,
                    type: type, // 'Check-In' or 'Check-Out'
                    timestamp: serverTimestamp(),
                    dateString: todayStr
                });

                showMessage(`${empName}-এর ${type === 'Check-In' ? 'চেক-ইন' : 'চেক-আউট'} সফল হয়েছে!`, true);
            } catch (error) {
                console.error("Firebase Storage Error: ", error);
                showMessage('ডাটা সেভ করতে সমস্যা হয়েছে। আবার চেষ্টা করুন।', false);
            }
        }

        document.getElementById('checkInBtn').addEventListener('click', () => markAttendance('Check-In'));
        document.getElementById('checkOutBtn').addEventListener('click', () => markAttendance('Check-Out'));

        // Realtime Data Listener for Today's Logs
        const todayStr = new Date().toISOString().split('T')[0];
        const q = query(
            collection(db, "attendances"),
            where("dateString", "==", todayStr),
            orderBy("timestamp", "desc")
        );

        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('logsContainer');
            if (snapshot.empty) {
                container.innerHTML = '<p class="text-xs text-slate-500 text-center py-4">আজকে এখনও কেউ হাজিরা দেয়নি</p>';
                return;
            }

            container.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                const timeStr = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }) : 'প্রসেসিং...';
                const isCheckIn = data.type === 'Check-In';

                const card = document.createElement('div');
                card.className = 'flex items-center justify-between p-2.5 bg-slate-900/60 border border-slate-700/40 rounded-xl text-xs';
                card.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full ${isCheckIn ? 'bg-emerald-400' : 'bg-rose-400'}"></span>
                        <div>
                            <p class="font-semibold text-white">${data.employeeName} <span class="text-[10px] text-slate-400">(${data.employeeId})</span></p>
                            <p class="text-[10px] text-slate-400">${data.type}</p>
                        </div>
                    </div>
                    <span class="font-mono text-slate-300 font-medium">${timeStr}</span>
                `;
                container.appendChild(card);
            });
        }, (error) => {
            console.error("Snapshot Listener Error: ", error);
            document.getElementById('logsContainer').innerHTML = '<p class="text-xs text-slate-500 text-center py-4">হাজিরা লিস্ট লোড হচ্ছে...</p>';
        });
    </script>
</body>
</html>
